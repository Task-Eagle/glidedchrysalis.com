<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gilded Chrysalis | Luxury Remote-Controlled Butterflies</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: {
                            50: '#fbf7eb',
                            100: '#f4ebcc',
                            200: '#e9d799',
                            300: '#dbbd60',
                            400: '#cea231',
                            500: '#b88a24',
                            600: '#976a1c',
                            700: '#754f19',
                            800: '#543916',
                            900: '#3c2712',
                            950: '#221408',
                        },
                        dark: {
                            900: '#060608',
                            800: '#0c0c10',
                            700: '#14141c',
                            600: '#1d1d29',
                            DEFAULT: '#0c0c10'
                        }
                    },
                    fontFamily: {
                        serif: ['Playfair Display', 'Georgia', 'serif'],
                        sans: ['Plus Jakarta Sans', 'Inter', 'sans-serif'],
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-glow': 'pulseGlow 2.5s ease-in-out infinite',
                        'flap-slow': 'flap 1.5s ease-in-out infinite',
                        'flap-fast': 'flap 0.3s ease-in-out infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0px) rotate(0deg)' },
                            '50%': { transform: 'translateY(-15px) rotate(2deg)' },
                        },
                        pulseGlow: {
                            '0%, 100%': { opacity: 0.3, filter: 'drop-shadow(0 0 5px rgba(212, 175, 55, 0.4))' },
                            '50%': { opacity: 1, filter: 'drop-shadow(0 0 25px rgba(212, 175, 55, 0.95))' },
                        },
                        flap: {
                            '0%, 100%': { transform: 'scaleX(1)' },
                            '50%': { transform: 'scaleX(0.1)' }
                        }
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</html>
